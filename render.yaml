services:
  # Backend API
  - type: web
    name: hrisa-mux-api
    runtime: node
    env: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && cd apps/api && pnpm run build
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: YOUTUBE_API_KEY
        sync: false
    healthCheckPath: /health
