services:
  # Backend API
  - type: web
    name: hrisa-mux-api
    runtime: node
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd apps/api && pnpm install && pnpm run build
    startCommand: cd apps/api && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: hrisa-mux-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: hrisa-mux-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: YOUTUBE_API_KEY
        sync: false
    healthCheckPath: /health

# Database
databases:
  - name: hrisa-mux-db
    databaseName: hrisa_mux
    plan: free
    region: frankfurt

  - name: hrisa-mux-redis
    plan: free
    region: frankfurt
